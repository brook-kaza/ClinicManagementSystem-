version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinic_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-super_secure_password_123}
      POSTGRES_DB: clinic_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic_admin} -d clinic_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  clinic-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENVIRONMENT=development
      - ALLOWED_ORIGINS=http://128.140.88.200,https://128.140.88.200,http://localhost,http://127.0.0.1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/usr/share/nginx/html

  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=${DB_POSTGRESDB_DATABASE:-n8n_db}
      - DB_POSTGRESDB_HOST=${DB_POSTGRESDB_HOST:-db}
      - DB_POSTGRESDB_PORT=${DB_POSTGRESDB_PORT:-5432}
      - DB_POSTGRESDB_USER=${DB_POSTGRESDB_USER:-clinic_admin}
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD:-super_secure_password_123}
      - WEBHOOK_URL=http://128.140.88.200:5678
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1.5G

  proxy:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - clinic-backend
      - n8n
      - frontend

volumes:
  postgres_data:
  n8n_data:
  frontend_dist:
