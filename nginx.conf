server {
    listen 80;
    server_name cursonclinic.com www.cursonclinic.com;

    # Redirect all HTTP requests to HTTPS with a 301 Moved Permanently response.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cursonclinic.com www.cursonclinic.com;

    # SSL configuration (Path might differ based on Certbot installation)
    ssl_certificate /etc/letsencrypt/live/cursonclinic.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cursonclinic.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve the React Frontend Build
    root /var/www/clinic-management-system/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy requests for uploaded X-Ray images
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
}
